<!-- BEGIN: content -->
<fieldset class="page-list-form-edit">
  <div class="row node-ids">
    <label>Target Page IDs: *</label>
    <input
      type="text"
      class="text"
      name="node[component][node_ids]"
      id="component-node-ids"
      value="{ID_LIST}"
    />
    <!-- BEGIN: list -->
    <div id="target-pages-list">
      <table>
        <!-- BEGIN: item -->
        <tr class="publish-{ITEM.publish}">
          <td>{ITEM.id}</td>
          <td>
            <a href="/backoffice/content/{ITEM.id}"
              >{ITEM.title|htmlspecialchars}</a
            >
          </td>
        </tr>
        <!-- END: item -->
      </table> 
    </div>
    <!-- END: list -->
    <a class="button" href="#"><span>Browse Server</span></a>
  </div>
</fieldset>

<script type="text/javascript">
  $(document).ready(function () {
    $("fieldset.page-list-form-edit div.node-ids a.button").click(function () {
      $("#target-pages-list")
        .addClass("htmx-request")
        .load(
          "/request/component/menu_js~id=0:expand_all=1:publish=0~",
          function () {
            $("#target-pages-list").removeClass("htmx-request");
            $("#target-pages-list .simple-tree").simpleTree({
              drag: false,
              autoclose: true,
              afterClick: function (node) {
                var node_id = $("a:first", node)
                  .attr("href")
                  .match("[0-9]{1,}$");
                var input = $("#component-node-ids");
                var ids = input.val();
                if (ids && ids.length > 0) input.val(ids + "," + node_id);
                else input.attr("value", node_id);
              },
              animate: true,
              docToFolderConvert: true,
            });
          },
        );
      return false;
    });
  });
</script>
<!-- END: content-->
