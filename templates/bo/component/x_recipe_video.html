<!-- BEGIN: content -->
{MESSAGES}
    <!-- BEGIN: preview -->
    <fieldset id="component-recipe-video" class="component-preview">
        <div id="recipe-video-loading" class="onyx-loading htmx-indicator">
            <img src="/share/images/loading.svg" alt="Loading..."/>
        </div>

        <legend>Recipe Video</legend>

        <span class="label">Video URL:</span>
        <span class="value">{RECIPE.video_url|htmlspecialchars}</span>

        <div class="component-actions">
            <button
                hx-get="/request/bo/component/x_recipe_video?edit=true&recipe_id={RECIPE.id}"
                hx-target="#edit-dialog .content"
                hx-indicator="#edit-loading"
                hx-trigger="click"
                hx-swap="innerHTML"
                hx-on::before-request="openDialog()"
                class="btn">
                Edit
            </button>
        </div>
    </fieldset>
    <!-- END: preview -->

    <!-- BEGIN: edit -->
    <form id="recipe-video-edit">
        <h2>Edit Recipe Video</h2>

        <div class="row text">
            <label for="recipe-video-url">Video URL:</label>
            <input 
                type="text"
                id="recipe-video-url"
                name="recipe[video_url]"
                value="{RECIPE.video_url|htmlspecialchars}"
            />
        </div>

        <input type="hidden" name="csrf_token" value="{CSRF_TOKEN}" />
        <input type="hidden" name="recipe[id]" value="{RECIPE.id}" />

        <div class="edit-actions">
            <button 
                hx-indicator="#edit-loading"
                hx-post="/request/bo/component/x_recipe_video"
                class="btn" 
                type="submit" 
                name="save" 
                value="save" 
                id="saveAndClose"
            >
                Save & Close
            </button>

            <button class="btn secondary" type="button" onclick="closeDialog()">Cancel</button>
        </div>
    </form>
    <!-- END: edit -->
<!-- END: content -->
