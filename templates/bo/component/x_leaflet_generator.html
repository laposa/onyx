<!-- BEGIN: content -->
{MESSAGES}
<style>
    .node-files button.secondary{ display: none; }
</style>

    <!-- BEGIN: preview -->
    <fieldset id="component-leaflet-generator" class="component-preview">

			<legend>Leaflet Generator</legend>

			<br>
			
			<div
				id="file-list-preview"
				hx-get="/request/bo/component/file_list?type=add_to_node&relation=node&node_id={NODE.id}"
				hx-trigger="load, refreshLeaflet from:body">
			</div>

			<!-- TODO: list of hotspots? expandable or only in edit? -->

			<div class="component-actions">
				<button
					hx-get="/request/bo/component/x_leaflet_generator?edit=true&node_id={NODE.id}"
					hx-target="#edit-dialog .content"
					hx-indicator="#edit-dialog"
					hx-trigger="click"
					hx-swap="innerHTML"
					hx-on::before-request="openDialog()"
					class="btn">
					Edit
				</button>
			</div>
			
    </fieldset>
    <!-- END: preview -->

    <!-- BEGIN: edit -->
		<form id="leaflet-generator-edit">
			<h2>Leaflet Generator Edit</h2>

			<!-- BEGIN: error -->
				<div class="error-message">
					An error occurred while processing your request.
				</div>
			<!-- END: error -->

			<!-- BEGIN: no_file -->
				<div class="error-message">
					No PDF file found for conversion.
				</div>
			<!-- END: no_file -->

			<span class="label">
				Files:<br>
				1: Source PDF File<br>
				Other: Individual Pages
			</span>

			<br>

			<div 
				id="file-list-edit"
				class="node-files"
				hx-swap="innerHTML"
				hx-get="/request/bo/component/x_node_file_list?&relation=node&node_id={NODE.id}"
				hx-trigger="load, refresh">
			</div>

			<button
				hx-get="/request/bo/component/x_leaflet_generator?node_id={NODE.id}&edit=true&generate=true"
				hx-trigger="click"
				hx-target="#leaflet-generator-edit"
				hx-swap="innerHTML"
				hx-indicator="#edit-dialog">
				Generate PDF Brochure
			</button>

			<br>

			<div class="row text">
				<label for="pdf-manifest">
					PDF2Web Manifest:
				</label>
				<textarea name="node[custom_fields][pdf2Web]" id="pdf-manifest" readonly>{NODE.custom_fields.pdf2Web|htmlspecialchars}</textarea>
			</div>

			<input type="hidden" name="csrf_token" value="{CSRF_TOKEN}" />
			<input type="hidden" name="node[id]" value="{GET.node_id}" />

			<div class="edit-actions">
					<button 
						hx-indicator="#edit-dialog"
						hx-post="/request/bo/component/x_leaflet_generator"
						class="btn" 
						type="submit" 
						name="save" 
						value="save" 
						hx-on::after-request="closeDialog()"
					>
							Save & Close
					</button>

					<button class="btn secondary" type="button" onclick="closeDialog()">Cancel</button>
			</div>
		</form>
    <!-- END: edit -->
<!-- END: content -->
