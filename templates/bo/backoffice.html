<!-- BEGIN: content -->
<div id="onyx-header">
    
    <div id="onyx-menu-bar">

        <ul id="menu-system">
            <li class="onyx-version" ><a href="/" title="{CONFIGURATION.global.title|htmlspecialchars} using {ONYX_VERSION} {ONYX_PACKAGE_NAME|ucfirst}" onclick="openAjaxRequestInDialog('/request/bo/component/sysinfo', '{ONYX_VERSION}'); return false;"><span>Onyx<br />{CONFIGURATION.global.title|htmlspecialchars}</span></a></li>
        </ul>
        
        <ul id="menu-frontoffice">
            <li class="frontoffice"><a href="/edit"><span>Front Office</span></a></li>
        </ul>

        {ONYX_REQUEST_menu #bo/backoffice_menu}
        
    </div>

</div>

<div id="onyx-backoffice">

    <div class="bo-page">
        {MESSAGES}
        {SUB_CONTENT}
    </div>

    <script>
        document.body.addEventListener('loadNewNode', function(event) {
            if (event.detail && event.detail.nodeId) {
                // Manually trigger the HTMX request with the node ID
                htmx.ajax('GET', '/request/bo/pages/content', {
                    target: '.bo-page',
                    values: { id: event.detail.nodeId },
                }).then(function() {
                    let newLink = window.location.origin + '/backoffice/content/' + event.detail.nodeId;
    
                    if(window.history.pushState) {
                        window.history.pushState({}, '', newLink);
                    }     
                });
            }
        });
    </script>
</div>
<!-- END: content -->
